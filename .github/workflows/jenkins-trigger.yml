name: Java CI with Maven using Trigger

on:
  push:
    branches: [ "disabled" ]

  workflow_dispatch:

jobs:
  trigger-event:
    runs-on: ubuntu-latest
    steps:        
    - name: triggerjenkinsjob
      uses: appleboy/jenkins-action@master
      with:
        url:  "http://192.168.1.193:8080"
        job: "TomcatDeployment"
        user: "qasachin"
        token: ${{ secrets.JENKINS_TOKEN }}
